{% extends 'layout.html' %}

{% block content %}

<h2>Add Task</h2>
<form method="POST">
    <div class="mb-3">
        <label>Task Name</label>
        <input
            type="text"
            name="task_name"
            class="form-control"
            placeholder="e.g., Database Project"
            required
        >
    </div>

    <div class="mb-3">
        <label>Task Description</label>
        <textarea
            name="task_description"
            class="form-control"
            placeholder="Briefly describe the task requirements..."
        ></textarea>
    </div>

    <div class="mb-3">
        <label>Maximum Marks</label>
        <input
            type="number"
            name="maximum_marks"
            class="form-control"
            min="0"
            required
        >
    </div>

    <button
        type="submit"
        class="btn btn-primary"
    >
        Save Task
    </button>

</form>

{% endblock %}
